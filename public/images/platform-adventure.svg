<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#191940"/>
      <stop offset="100%" stop-color="#436191"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#373752"/>
      <stop offset="100%" stop-color="#232032"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE040"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="340" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="70" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="350" cy="30" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="500" cy="55" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="650" cy="25" r="1.8" fill="#fff" opacity="0.8"/>
  <circle cx="720" cy="80" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="130" cy="100" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="450" cy="90" r="1" fill="#fff" opacity="0.7"/>

  <!-- Mountains -->
  <polygon points="0,340 100,180 200,340" fill="#555570"/>
  <polygon points="150,340 300,150 450,340" fill="#606080"/>
  <polygon points="400,340 520,200 640,340" fill="#555570"/>
  <polygon points="580,340 700,170 800,340" fill="#606080"/>
  <!-- Snow caps -->
  <polygon points="100,180 80,210 120,210" fill="#dde"/>
  <polygon points="300,150 280,185 320,185" fill="#dde"/>
  <polygon points="520,200 502,228 538,228" fill="#dde"/>
  <polygon points="700,170 682,200 718,200" fill="#dde"/>

  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="150" cy="110" rx="50" ry="18" fill="#fff"/>
    <ellipse cx="125" cy="115" rx="35" ry="14" fill="#fff"/>
    <ellipse cx="175" cy="113" rx="40" ry="15" fill="#fff"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="550" cy="90" rx="45" ry="16" fill="#fff"/>
    <ellipse cx="530" cy="95" rx="30" ry="12" fill="#fff"/>
    <ellipse cx="570" cy="93" rx="35" ry="13" fill="#fff"/>
  </g>

  <!-- Ground -->
  <rect y="340" width="800" height="110" fill="url(#ground)"/>
  <line x1="0" y1="340" x2="800" y2="340" stroke="#327832" stroke-width="3"/>

  <!-- Canyon -->
  <rect x="300" y="340" width="90" height="110" fill="#0a0515"/>
  <line x1="300" y1="340" x2="300" y2="450" stroke="#231830" stroke-width="2"/>
  <line x1="390" y1="340" x2="390" y2="450" stroke="#231830" stroke-width="2"/>

  <!-- Trees -->
  <g>
    <rect x="85" y="280" width="14" height="60" rx="2" fill="#5a3d1e"/>
    <ellipse cx="92" cy="265" rx="32" ry="30" fill="#228B22"/>
    <ellipse cx="78" cy="275" rx="22" ry="22" fill="#1a7a1a"/>
    <ellipse cx="106" cy="275" rx="22" ry="22" fill="#1a7a1a"/>
    <circle cx="100" cy="255" r="4" fill="#c00"/>
    <circle cx="80" cy="270" r="3.5" fill="#c00"/>
  </g>
  <g>
    <rect x="525" y="285" width="12" height="55" rx="2" fill="#5a3d1e"/>
    <ellipse cx="531" cy="270" rx="28" ry="26" fill="#228B22"/>
    <ellipse cx="518" cy="278" rx="20" ry="19" fill="#1a7a1a"/>
    <ellipse cx="544" cy="278" rx="20" ry="19" fill="#1a7a1a"/>
  </g>

  <!-- Platform -->
  <rect x="430" y="280" width="100" height="12" rx="4" fill="#6e4b23" stroke="#503a18" stroke-width="1.5"/>
  <rect x="433" y="281" width="94" height="4" rx="2" fill="#916838"/>

  <!-- Coins -->
  <g>
    <circle cx="450" cy="255" r="10" fill="url(#gold)" stroke="#daa520" stroke-width="2"/>
    <circle cx="450" cy="255" r="6" fill="#ffe03c"/>
    <text x="450" y="259" text-anchor="middle" font-size="11" fill="#b8860b" font-weight="bold">$</text>
  </g>
  <g>
    <circle cx="480" cy="255" r="10" fill="url(#gold)" stroke="#daa520" stroke-width="2"/>
    <circle cx="480" cy="255" r="6" fill="#ffe03c"/>
    <text x="480" y="259" text-anchor="middle" font-size="11" fill="#b8860b" font-weight="bold">$</text>
  </g>
  <g>
    <circle cx="510" cy="255" r="10" fill="url(#gold)" stroke="#daa520" stroke-width="2"/>
    <circle cx="510" cy="255" r="6" fill="#ffe03c"/>
    <text x="510" y="259" text-anchor="middle" font-size="11" fill="#b8860b" font-weight="bold">$</text>
  </g>
  <g>
    <circle cx="250" cy="305" r="10" fill="url(#gold)" stroke="#daa520" stroke-width="2"/>
    <circle cx="250" cy="305" r="6" fill="#ffe03c"/>
    <text x="250" y="309" text-anchor="middle" font-size="11" fill="#b8860b" font-weight="bold">$</text>
  </g>

  <!-- Enemy (spiky ball) -->
  <g transform="translate(620, 320)">
    <circle r="18" fill="#dc143c" stroke="#8b0000" stroke-width="2"/>
    <circle r="10" fill="#e84060" opacity="0.4"/>
    <!-- Spikes -->
    <polygon points="0,-18 4,-28 -4,-28" fill="#8b0000"/>
    <polygon points="18,0 28,4 28,-4" fill="#8b0000"/>
    <polygon points="0,18 4,28 -4,28" fill="#8b0000"/>
    <polygon points="-18,0 -28,4 -28,-4" fill="#8b0000"/>
    <polygon points="13,-13 22,-16 16,-22" fill="#8b0000"/>
    <polygon points="13,13 22,16 16,22" fill="#8b0000"/>
    <polygon points="-13,13 -22,16 -16,22" fill="#8b0000"/>
    <polygon points="-13,-13 -22,-16 -16,-22" fill="#8b0000"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="-4" rx="5" ry="5.5" fill="#fff"/>
    <ellipse cx="5" cy="-4" rx="5" ry="5.5" fill="#fff"/>
    <circle cx="-4" cy="-4" r="2.5" fill="#111"/>
    <circle cx="6" cy="-4" r="2.5" fill="#111"/>
  </g>

  <!-- Character -->
  <g transform="translate(200, 340)">
    <!-- Shadow -->
    <ellipse cx="0" cy="0" rx="14" ry="4" fill="#000" opacity="0.15"/>
    <!-- Boots -->
    <rect x="-8" y="-4" width="7" height="4" rx="1" fill="#463220"/>
    <rect x="2" y="-4" width="7" height="4" rx="1" fill="#463220"/>
    <!-- Legs -->
    <rect x="-6" y="-20" width="5" height="16" rx="2" fill="#3c3c5a"/>
    <rect x="2" y="-20" width="5" height="16" rx="2" fill="#3c3c5a"/>
    <!-- Body -->
    <rect x="-8" y="-50" width="16" height="32" rx="4" fill="#50508c" stroke="#3c3c6e" stroke-width="1"/>
    <!-- Belt -->
    <rect x="-8" y="-22" width="16" height="3" fill="#644628"/>
    <ellipse cx="0" cy="-20" rx="2.5" ry="2" fill="#c8b432"/>
    <!-- Arms -->
    <rect x="-12" y="-44" width="5" height="16" rx="2.5" fill="#50508c"/>
    <rect x="8" y="-44" width="5" height="16" rx="2.5" fill="#50508c"/>
    <!-- Hands -->
    <circle cx="-9.5" cy="-28" r="3" fill="#dcb496"/>
    <circle cx="10.5" cy="-28" r="3" fill="#dcb496"/>
    <!-- Head -->
    <ellipse cx="0" cy="-58" rx="10" ry="11" fill="#dcb99b" stroke="#b4967d" stroke-width="1"/>
    <!-- Hair -->
    <path d="M-10,-63 Q-10,-73 0,-73 Q10,-73 10,-63 Q8,-67 0,-68 Q-8,-67 -10,-63Z" fill="#3c2819"/>
    <ellipse cx="3" cy="-70" rx="4" ry="3" fill="#3c2819"/>
    <!-- Eye -->
    <ellipse cx="3" cy="-59" rx="3.5" ry="4" fill="#fff"/>
    <ellipse cx="4" cy="-59" rx="2" ry="2.5" fill="#283c64"/>
    <circle cx="4.5" cy="-60" r="0.8" fill="#fff"/>
    <!-- Mouth -->
    <path d="M1,-53 Q3,-51 5,-53" fill="none" stroke="#966450" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Flagpole -->
  <g transform="translate(740, 340)">
    <ellipse cx="0" cy="0" rx="14" ry="5" fill="#505050"/>
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#ccc" stroke-width="4"/>
    <circle cx="0" cy="-160" r="6" fill="#FFD700" stroke="#daa520" stroke-width="2"/>
    <!-- Flag -->
    <path d="M0,-140 Q20,-132 40,-135 Q20,-125 0,-120Z" fill="#dc1e1e"/>
    <text x="20" y="-130" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">★</text>
  </g>

  <!-- Power-up (invincibility) -->
  <g transform="translate(160, 290)">
    <circle r="16" fill="#8a2be2" opacity="0.2"/>
    <rect x="-10" y="-10" width="20" height="20" rx="3" fill="#8a2be2" opacity="0.85" transform="rotate(45)"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="#fff">★</text>
  </g>

  <!-- HUD Panel -->
  <rect x="12" y="12" width="180" height="70" rx="8" fill="#000" opacity="0.6"/>
  <!-- Score -->
  <circle cx="30" cy="30" r="7" fill="#FFD700"/>
  <text x="30" y="34" text-anchor="middle" font-size="8" fill="#b8860b" font-weight="bold">$</text>
  <text x="44" y="34" font-size="16" fill="#fff" font-family="monospace" font-weight="bold">1250</text>
  <!-- Level -->
  <text x="22" y="52" font-size="12" fill="#b4c8ff" font-family="monospace">Level 3 / 5</text>
  <!-- Lives -->
  <text x="22" y="70" font-size="14" fill="#ff3250" font-family="sans-serif">♥ ♥ ♥</text>

  <!-- Weather: rain streaks -->
  <g opacity="0.25" stroke="#b4c8ff" stroke-width="1.2">
    <line x1="50" y1="120" x2="55" y2="140"/>
    <line x1="150" y1="80" x2="155" y2="100"/>
    <line x1="280" y1="150" x2="285" y2="170"/>
    <line x1="400" y1="60" x2="405" y2="80"/>
    <line x1="500" y1="130" x2="505" y2="150"/>
    <line x1="650" y1="100" x2="655" y2="120"/>
    <line x1="750" y1="70" x2="755" y2="90"/>
    <line x1="100" y1="200" x2="105" y2="220"/>
    <line x1="350" y1="220" x2="355" y2="240"/>
    <line x1="580" y1="180" x2="585" y2="200"/>
  </g>

  <!-- Title overlay at bottom -->
  <rect x="0" y="400" width="800" height="50" fill="#000" opacity="0.7"/>
  <text x="400" y="430" text-anchor="middle" font-size="22" fill="#FFD700" font-family="monospace" font-weight="bold" letter-spacing="3">PLATFORM ADVENTURE</text>
  <text x="400" y="446" text-anchor="middle" font-size="10" fill="#8899bb" font-family="monospace" letter-spacing="2">ENHANCED EDITION — 5 LEVELS • WEATHER • DASH • COMBOS</text>
</svg>
