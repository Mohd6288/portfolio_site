<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a0f"/>
      <stop offset="100%" stop-color="#0f2b1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006C35"/>
      <stop offset="100%" stop-color="#00a651"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Islamic geometric pattern (subtle) -->
  <g opacity="0.06" stroke="#006C35" stroke-width="0.8" fill="none">
    <polygon points="100,50 120,85 100,120 80,85"/>
    <polygon points="200,30 220,65 200,100 180,65"/>
    <polygon points="600,60 620,95 600,130 580,95"/>
    <polygon points="700,40 720,75 700,110 680,75"/>
    <polygon points="150,350 170,385 150,420 130,385"/>
    <polygon points="650,330 670,365 650,400 630,365"/>
    <circle cx="350" cy="50" r="25"/>
    <circle cx="450" cy="400" r="20"/>
  </g>
  <!-- Floating particles -->
  <circle cx="120" cy="100" r="2" fill="#006C35" opacity="0.3"/>
  <circle cx="680" cy="80" r="2.5" fill="#FFD700" opacity="0.3"/>
  <circle cx="200" cy="380" r="2" fill="#006C35" opacity="0.25"/>
  <circle cx="600" cy="370" r="1.5" fill="#FFD700" opacity="0.25"/>
  <circle cx="50" cy="250" r="2" fill="#006C35" opacity="0.2"/>
  <circle cx="750" cy="200" r="2" fill="#FFD700" opacity="0.2"/>
  <!-- Main card background -->
  <rect x="120" y="60" width="560" height="330" rx="20" fill="#111" stroke="#006C35" stroke-width="1" opacity="0.5"/>
  <!-- Saudi flag icon -->
  <rect x="170" y="100" width="60" height="40" rx="6" fill="#006C35" opacity="0.7"/>
  <text x="200" y="126" text-anchor="middle" font-size="20" fill="white">🇸🇦</text>
  <!-- Title -->
  <text x="250" y="118" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Vision 2030</text>
  <text x="250" y="142" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="url(#accent)">Quiz Arena</text>
  <!-- Arabic subtitle -->
  <text x="560" y="130" text-anchor="end" font-family="serif" font-size="16" fill="#FFD700" opacity="0.5" direction="rtl">ساحة اختبار رؤية ٢٠٣٠</text>
  <!-- Feature badges -->
  <rect x="170" y="170" width="100" height="30" rx="8" fill="#006C35" opacity="0.15" stroke="#006C35" stroke-width="0.8"/>
  <text x="220" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#006C35">120+ Questions</text>
  <rect x="285" y="170" width="90" height="30" rx="8" fill="#006C35" opacity="0.15" stroke="#006C35" stroke-width="0.8"/>
  <text x="330" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#006C35">6 Categories</text>
  <rect x="390" y="170" width="80" height="30" rx="8" fill="#FFD700" opacity="0.1" stroke="#FFD700" stroke-width="0.8"/>
  <text x="430" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFD700">AI Powered</text>
  <rect x="485" y="170" width="90" height="30" rx="8" fill="#006C35" opacity="0.15" stroke="#006C35" stroke-width="0.8"/>
  <text x="530" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#006C35">Story Mode</text>
  <!-- Quiz question mockup -->
  <rect x="170" y="220" width="460" height="50" rx="12" fill="#1a1a2e" stroke="#333" stroke-width="0.8"/>
  <text x="190" y="250" font-family="Arial, sans-serif" font-size="13" fill="#ccc">What is the planned length of THE LINE in NEOM?</text>
  <!-- Answer options -->
  <rect x="170" y="280" width="220" height="35" rx="10" fill="#006C35" opacity="0.12" stroke="#006C35" stroke-width="0.8"/>
  <rect x="180" y="288" width="20" height="20" rx="5" fill="#006C35" opacity="0.3"/>
  <text x="190" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">A</text>
  <text x="215" y="303" font-family="Arial, sans-serif" font-size="12" fill="#ccc">170 km ✓</text>
  <rect x="410" y="280" width="220" height="35" rx="10" fill="#222" stroke="#333" stroke-width="0.8"/>
  <rect x="420" y="288" width="20" height="20" rx="5" fill="#333"/>
  <text x="430" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#666">B</text>
  <text x="455" y="303" font-family="Arial, sans-serif" font-size="12" fill="#666">500 km</text>
  <rect x="170" y="325" width="220" height="35" rx="10" fill="#222" stroke="#333" stroke-width="0.8"/>
  <rect x="180" y="333" width="20" height="20" rx="5" fill="#333"/>
  <text x="190" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#666">C</text>
  <text x="215" y="348" font-family="Arial, sans-serif" font-size="12" fill="#666">50 km</text>
  <rect x="410" y="325" width="220" height="35" rx="10" fill="#222" stroke="#333" stroke-width="0.8"/>
  <rect x="420" y="333" width="20" height="20" rx="5" fill="#333"/>
  <text x="430" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#666">D</text>
  <text x="455" y="348" font-family="Arial, sans-serif" font-size="12" fill="#666">10 km</text>
  <!-- Rank badge -->
  <circle cx="680" y="100" r="28" cx="680" cy="100" fill="#FFD700" opacity="0.15" stroke="#FFD700" stroke-width="1.5"/>
  <text x="680" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFD700">S</text>
  <!-- Timer ring -->
  <circle cx="680" cy="180" r="20" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="680" cy="180" r="20" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="100" stroke-dashoffset="25" stroke-linecap="round"/>
  <text x="680" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#22c55e">15</text>
  <!-- Score -->
  <text x="680" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFD700">★ 1,250</text>
  <!-- Streak -->
  <text x="680" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFD700" opacity="0.6">🔥 5x</text>
</svg>